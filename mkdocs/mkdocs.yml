site_name: 项目文档
docs_dir: docs
site_dir: site
theme:
  name: material
  language: zh
markdown_extensions:
  - tables
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
nav:
  - 首页: index.md
